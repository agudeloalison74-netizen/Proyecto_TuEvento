<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | TuEvento</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <h1>TUEVENTO</h1>
        <h2>Recuperar Contraseña</h2>

        <p class="mensaje-recuperacion">
            Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" placeholder="ejemplo@gmail.com" required>
            </div>

            <button type="submit" class="btn-login">
                Enviar Enlace
            </button>

        </form>

        <div class="links">
            <a href="login.html">Volver al inicio de sesión</a>
            <a href="index.html">Ir al inicio</a>
        </div>

    </div>

</div>

<footer>
    <div class="footer-contenido">
        <h3>TuEvento</h3>
        <p>Gestión y organización de eventos.</p>
        <p>📧 contacto@tuevento.com</p>
        <p>📞 +57 300 123 4567</p>
        <p>© 2026 Todos los derechos reservados.</p>
    </div>
</footer>

</body>
</html>
