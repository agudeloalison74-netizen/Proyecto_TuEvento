<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | TuEvento</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="icon" type="image/png" href="../img/logo.png">
</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>TUEVENTO</h1>
            <h2>Iniciar Sesión</h2>

            <form>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@gmail.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="********" required>
                </div>

                <div class="input-group">
                    <label>Tipo de Usuario</label>
                    <select required>
                        <option value="">Seleccione una opción</option>
                        <option>Usuario</option>
                        <option>Empresa</option>
                        <option>Administrador</option>
                    </select>
                </div>

                <button type="submit" class="btn-login">
                    Ingresar
                </button>

            </form>

            <div class="links">
                <a href="recuperar_contrasena.html">¿Olvidaste tu contraseña?</a>
                <a href="index.html">Volver al inicio</a>
            </div>

        </div>

    </div>

        <footer>

    <div class="footer-contenido">

        <h3>TuEvento</h3>

        <p>
            Plataforma para la gestión y organización de eventos.
        </p>

        <p>
            © 2026 TuEvento.
        </p>

        <p>
            Desarrollado por Alison Agudelo y Dayana
        </p>

    </div>

    </footer>

</body>
</html>
