<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Empresa | TuEvento</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="icon" type="image/png" href="../img/logo.png">
</head>

<body>

<div class="registro-container">

    <div class="registro-card">

        <h1>TUEVENTO</h1>
        <h2>Registro de Empresa</h2>

        <form>

            <div class="input-group">
                <label>Nombre de la Empresa</label>
                <input type="text" placeholder="Nombre de la empresa" required>
            </div>

            <div class="input-group">
                <label>NIT</label>
                <input type="text" placeholder="Ingrese el NIT" required>
            </div>

            <div class="input-group">
                <label>Correo Empresarial</label>
                <input type="email" placeholder="empresa@gmail.com" required>
            </div>

            <div class="input-group">
                <label>Teléfono</label>
                <input type="tel" placeholder="******" required>
            </div>

            <div class="input-group">
                <label>Ciudad</label>
                <input type="text" placeholder="Ciudad" required>
            </div>

            <div class="input-group">
             <label>Documento de Verificación Empresarial</label>

                <div class="upload-container">
                   <input type="file" id="documento" accept="image/*" hidden>

                    <label for="documento" class="upload-box">
                      <img id="preview" src="../img/subir.png" alt="Subir documento">
                      <span>Haz clic para subir una imagen</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="********" required>
            </div>

            <button type="submit" class="btn-login">
                Registrar Empresa
            </button>

        </form>

        <div class="links">
            <a href="login.html">Ya tengo una cuenta</a>
            <a href="index.html">Volver al inicio</a>
        </div>

    </div>

</div>

    <footer>

    <div class="footer-contenido">

        <h3>TuEvento</h3>

        <p>
            Plataforma para la gestión y organización de eventos.
        </p>

        <p>
            © 2026 TuEvento. 
        </p>

        <p>
            Desarrollado por Alison Agudelo y Dayana
        </p>

    </div>

    </footer>

    <script>
      const documento = document.getElementById("documento");
      const preview = document.getElementById("preview");
      const texto = document.querySelector(".upload-box span");

      documento.addEventListener("change", function(){

        const archivo = this.files[0];

        if(archivo){

           const lector = new FileReader();

           lector.onload = function(e){
               preview.src = e.target.result;
               texto.style.display = "none";
            }

            lector.readAsDataURL(archivo);
        }
     });
    </script>

</body>
</html>
